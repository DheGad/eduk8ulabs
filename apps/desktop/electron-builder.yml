appId: com.streetmp.os
productName: StreetMP OS
artifactName: StreetMP-OS-${version}-${os}.${ext}
copyright: Copyright © 2026 StreetMP, Inc. All rights reserved.

# ─── Directories ─────────────────────────────────────────────────────────────
directories:
  output:     dist-packages
  buildResources: assets

# ─── Included Files ─────────────────────────────────────────────────────────
files:
  - dist/**
  - dist-electron/**
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/.bin"
  - "!**/*.d.ts"

# ─── macOS ───────────────────────────────────────────────────────────────────
mac:
  category:           public.app-category.business
  target:
    - target: dmg
      arch:   [x64, arm64]    # Universal binary — Intel + Apple Silicon
    - target: zip
      arch:   [x64, arm64]

  # Apple Notarization requirements
  hardenedRuntime:    true           # REQUIRED for notarization
  gatekeeperAssess:   false          # Disable during build (Xcode handles)
  entitlementsInherit: build/entitlements.mac.plist

  # Deep-link protocol
  protocols:
    - name:    StreetMP OS
      schemes: [streetmp]

  icon:       assets/icon.icns
  darkModeSupport: true

dmg:
  title:       "StreetMP OS ${version}"
  icon:        assets/icon.icns
  background:  assets/dmg-background.png
  iconSize:    128
  window:
    width:  640
    height: 400
  contents:
    - x: 180
      y: 180
    - x: 460
      y: 180
      type: link
      path: /Applications

# ─── Windows ─────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:   [x64, ia32]
    - target: portable
      arch:   [x64]

  # Authenticode Code Signing
  certificateSubjectName: "StreetMP, Inc."
  verifyUpdateCodeSignature: true
  signingHashAlgorithms: [sha256]

  # Deep-link protocol
  protocols:
    - name:    StreetMP OS
      schemes: [streetmp]

  icon:       assets/icon.ico

  requestedExecutionLevel: asInvoker   # Do NOT require UAC elevation

nsis:
  oneClick:         false
  allowToChangeInstallationDirectory: false
  installerIcon:    assets/icon.ico
  uninstallerIcon:  assets/icon.ico
  installerHeader:  assets/installer-header.bmp
  installerHeaderBackground: "#0A0A0A"
  shortcutName:     "StreetMP OS"
  createDesktopShortcut: true
  createStartMenuShortcut: true
  include:          build/installer.nsh

# ─── Linux ───────────────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch:   [x64, arm64]
    - target: deb
      arch:   [x64]
    - target: rpm
      arch:   [x64]

  category:    Office
  icon:        assets/icons
  description: StreetMP OS — Sovereign Enterprise AI Operating System
  maintainer:  StreetMP, Inc. <security@streetmp.com>
  vendor:      StreetMP, Inc.

  # MimeType for deep-link handling
  mimeTypes:   ["x-scheme-handler/streetmp"]
  desktop:
    MimeType: x-scheme-handler/streetmp

# ─── Auto-Update Feed ────────────────────────────────────────────────────────
# Generates update manifests consumed by electron-updater
publish:
  provider:   github
  owner:      streetmp
  repo:       os-desktop
  private:    true
  releaseType: release

# ─── Build Metadata ──────────────────────────────────────────────────────────
extraMetadata:
  main: dist-electron/main.js

# ─── Compression ─────────────────────────────────────────────────────────────
compression: maximum

# ─── ASR (asar) Packaging ────────────────────────────────────────────────────
asar: true
asarUnpack:
  - "**/*.node"            # Native Node addons must remain unpacked
  - "**/node_modules/electron-log/**"
