# =============================================================================
# prometheus.yml
# Prometheus scrape configuration for StreetMP OS
# Scrapes /metrics from Router and Enforcer services
# =============================================================================
global:
  scrape_interval:     15s   # How often to scrape targets
  evaluation_interval: 15s   # How often to evaluate rules
  scrape_timeout:      10s

  # Labels added to every time series and alert from this server
  external_labels:
    cluster:     "streetmp-os"
    environment: "production"

# ── Alert rules file (add custom SLA alerts here) ─────────────────
rule_files:
  - "alerts.yml"

# ── Scrape configurations ─────────────────────────────────────────
scrape_configs:

  # ── Prometheus self-monitoring ────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── Router Service — latency, throughput, error rate ─────────
  - job_name: "router-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["router-service:4000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: service_name
        replacement: "router-service"

  # ── Enforcer Service — validation pass/fail rate ─────────────
  - job_name: "enforcer-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["enforcer-service:4001"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: service_name
        replacement: "enforcer-service"

  # ── Trust Service — PoE generation rate ──────────────────────
  - job_name: "trust-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["trust-service:4005"]
    relabel_configs:
      - target_label: service_name
        replacement: "trust-service"

  # ── Memory Service — model selection hit rate ─────────────────
  - job_name: "memory-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["memory-service:4007"]
    relabel_configs:
      - target_label: service_name
        replacement: "memory-service"

  # ── Policy Service — policy enforcement decisions ─────────────
  - job_name: "policy-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["policy-service:4008"]
    relabel_configs:
      - target_label: service_name
        replacement: "policy-service"

  # ── Caddy reverse proxy — connection metrics ──────────────────
  - job_name: "caddy"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["caddy:2019"]      # Caddy admin API exposes Prometheus at :2019/metrics
    relabel_configs:
      - target_label: service_name
        replacement: "caddy"

  # ── Node Exporter — OS-level CPU/RAM/disk ────────────────────
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    relabel_configs:
      - target_label: service_name
        replacement: "host"
