name: Build Native Clients (V93 Sovereign Shell)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        type: choice
        required: true
        options: [all, mac, win, linux]
        default: all

env:
  NODE_VERSION: "20"
  ELECTRON_VERSION: "31.2.1"

jobs:
  # ─── macOS Build (ARM + x64 Universal) ─────────────────────────────────────
  build-mac:
    name: macOS (ARM64 + x64)
    runs-on: macos-14          # Apple Silicon runner
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'mac' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build TypeScript
        working-directory: apps/desktop
        run: npm run type-check && npx tsc

      - name: Build macOS DMG (Universal Binary)
        working-directory: apps/desktop
        env:
          APPLE_ID:              ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASS: ${{ secrets.APPLE_APP_SPECIFIC_PASS }}
          APPLE_TEAM_ID:         ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK:              ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
          CSC_KEY_PASSWORD:      ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          GH_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: streetmp-os-mac
          path: |
            apps/desktop/dist-packages/*.dmg
            apps/desktop/dist-packages/*.zip
          retention-days: 30

  # ─── Windows Build (x64 + ia32) ─────────────────────────────────────────────
  build-win:
    name: Windows (x64 + ia32)
    runs-on: windows-2022
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'win' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build TypeScript
        working-directory: apps/desktop
        run: npm run type-check

      - name: Build Windows NSIS Installer
        working-directory: apps/desktop
        env:
          WIN_CSC_LINK:     ${{ secrets.WIN_CERTIFICATE_P12_BASE64 }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
          GH_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: streetmp-os-win
          path: |
            apps/desktop/dist-packages/*.exe
            apps/desktop/dist-packages/*.msi
          retention-days: 30

  # ─── Linux Build (AppImage + deb + rpm) ─────────────────────────────────────
  build-linux:
    name: Linux (AppImage + deb)
    runs-on: ubuntu-22.04
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3-dev libgdk-pixbuf2.0-dev libgtk-3-dev \
            libxss1 libgbm-dev libxshmfence-dev libasound2-dev \
            rpm

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build TypeScript
        working-directory: apps/desktop
        run: npm run type-check

      - name: Build Linux AppImage + deb
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: streetmp-os-linux
          path: |
            apps/desktop/dist-packages/*.AppImage
            apps/desktop/dist-packages/*.deb
            apps/desktop/dist-packages/*.rpm
          retention-days: 30

  # ─── Release: Attach all artifacts ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name:   "StreetMP OS ${{ github.ref_name }}"
          body:   "StreetMP OS Desktop Shell — Sovereign Zero-Trust Native Client"
          draft:  false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: dist-all/**/*
